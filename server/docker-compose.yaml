services:

  pgsql:
    image: postgres:17.2-alpine
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}' ]
      interval: 10s
      retries: 5
    networks:
      - sacco-dev

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - ${PORT}:8080
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - DATABASE_URL=postgres://user:pass@pgsql:5432/db
      - LOG_LEVEL=info
      - HOST=0.0.0.0
      - PORT=8080
      - POSTGRES_HOST=pgsql
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - NODE_ENV=production
    depends_on:
      pgsql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sacco-dev

networks:
  sacco-dev:
    driver: bridge

volumes:
  pg_data:
    driver: local
